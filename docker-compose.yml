version: '3.8'

services:
  app:
    build: .
    container_name: railway-rag-assistant
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LLM_PROVIDER=gemini
      - GEMINI_MODEL=gemini-3.1-flash-lite
      - USE_LOCAL_EMBEDDINGS=true
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
    restart: unless-stopped
