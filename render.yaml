services:
  - type: web
    name: railway-rag-assistant
    env: python
    region: singapore          # Closest to India
    plan: free
    buildCommand: "chmod +x build.sh && bash build.sh"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false            # Set manually in Render dashboard
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: USE_LOCAL_EMBEDDINGS
        value: "false"         # Use Gemini cloud embeddings — saves ~400MB RAM
      - key: HF_HUB_OFFLINE
        value: "0"             # Not needed — no local models
      - key: TRANSFORMERS_OFFLINE
        value: "0"             # Not needed — no local models
      - key: PYTHONUNBUFFERED
        value: "1"             # Force logs to flush immediately
